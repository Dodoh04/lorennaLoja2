{% load humanize %}

<div class="car-grid" id="car-grid">
    {% for carro in carros %}
    <article class="car-card">
        {% with carro_imagem=carro.imagens.first %}
        {% if carro_imagem %}
        <img src="{{ carro_imagem.imagem.url }}" alt="{{ carro.modelo }}">
        {% endif %}
        {% endwith %}
        <div class="car-card-body">
            <p class="car-card-brand">{{ carro.marca }}</p>
            <h3>{{ carro.modelo }}</h3>
            <p>{{ carro.km|intcomma }} km • {{ carro.cor }}</p>
            <a href="{% url 'detalhe-carro' carro.pk %}" class="button button-secondary">Detalhes</a>
        </div>
    </article>
    {% empty %}
    <p>Nenhum carro encontrado.</p>
    {% endfor %}
</div>
