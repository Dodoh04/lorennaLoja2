{% extends 'base.html' %}

{% block content %}
<section class="card-page">
    <div class="container">
        <h2>Histórico de vendas</h2>
        <table class="table">
            <thead>
                <tr>
                    <th>Cliente</th>
                    <th>Carro</th>
                    <th>Valor</th>
                    <th>Data</th>
                </tr>
            </thead>
            <tbody>
                {% for venda in vendas %}
                <tr>
                    <td>{{ venda.cliente }}</td>
                    <td>{{ venda.carro }}</td>
                    <td>R$ {{ venda.valor_venda|floatformat:2 }}</td>
                    <td>{{ venda.data_venda }}</td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="4">Nenhuma venda registrada.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</section>
{% endblock %}
